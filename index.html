<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Правовая экспертиза — РК</title>
<style>
  :root {
    --paper: #f5f0e8;
    --paper-dark: #ede5d0;
    --ink: #2c2418;
    --ink-light: #5a4a35;
    --seal: #8b1a1a;
    --seal-light: #c0392b;
    --gold: #b8962e;
    --border: #c9b99a;
    --success: #2d6a4f;
    --warning: #e07b00;
    --shadow: rgba(44,36,24,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--paper-dark);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--gold);
  }
  header .logo { font-size: 1.25rem; font-weight: bold; letter-spacing: .04em; }
  header .subtitle { font-size: .8rem; color: var(--border); font-style: italic; }
  .layout { display: flex; flex: 1; min-height: 0; }

  /* Sidebar */
  .sidebar {
    width: 260px; min-width: 220px;
    background: var(--paper);
    border-right: 2px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header span { font-size: .85rem; font-weight: bold; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-light); }
  .btn-small {
    background: var(--seal); color: #fff;
    border: none; padding: 5px 10px; border-radius: 3px;
    cursor: pointer; font-size: .78rem; font-family: inherit;
  }
  .btn-small:hover { background: var(--seal-light); }
  .case-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .case-item {
    padding: 10px 14px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s;
  }
  .case-item:hover { background: var(--paper-dark); }
  .case-item.active { border-left-color: var(--seal); background: var(--paper-dark); }
  .case-item .case-name { font-size: .88rem; font-weight: bold; }
  .case-item .case-status { font-size: .74rem; margin-top: 2px; }
  .status-draft { color: var(--ink-light); }
  .status-active { color: var(--warning); }
  .status-done { color: var(--success); }
  .sidebar-nav { border-top: 1px solid var(--border); }
  .nav-item {
    padding: 11px 14px; cursor: pointer; font-size: .85rem;
    border-left: 3px solid transparent;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-item:hover { background: var(--paper-dark); }
  .nav-item.active { border-left-color: var(--gold); background: var(--paper-dark); font-weight: bold; }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .card-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--paper-dark);
    display: flex; align-items: center; gap: 10px;
  }
  .card-header h2 { font-size: .95rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-light); }
  .card-body { padding: 18px; }
  label { display: block; font-size: .82rem; color: var(--ink-light); margin-bottom: 4px; font-weight: bold; }
  input[type=text], textarea, select {
    width: 100%; border: 1px solid var(--border);
    background: #fff; color: var(--ink);
    padding: 8px 10px; font-family: inherit; font-size: .88rem;
    border-radius: 3px; resize: vertical;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    outline: 2px solid var(--gold); border-color: var(--gold);
  }
  .form-row { margin-bottom: 14px; }
  .btn {
    padding: 8px 18px; border: none; border-radius: 3px;
    cursor: pointer; font-family: inherit; font-size: .85rem;
    font-weight: bold;
  }
  .btn-primary { background: var(--seal); color: #fff; }
  .btn-primary:hover { background: var(--seal-light); }
  .btn-secondary { background: var(--paper-dark); color: var(--ink); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .disclaimer {
    background: #fff8e1; border-left: 4px solid var(--gold);
    padding: 10px 14px; font-size: .8rem; color: var(--ink-light);
    margin: 12px 0; border-radius: 0 3px 3px 0;
  }
  .result-item {
    border: 1px solid var(--border); border-radius: 3px;
    padding: 10px 12px; margin-bottom: 8px;
    background: #fff;
  }
  .result-item .ri-title { font-weight: bold; font-size: .88rem; }
  .result-item .ri-meta { font-size: .76rem; color: var(--ink-light); margin-top: 3px; }
  .result-item .ri-score { display: inline-block; background: var(--seal); color: #fff; font-size: .72rem; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
  .tag-seed { background: #e0e0e0; color: #555; font-size: .7rem; padding: 1px 5px; border-radius: 8px; }
  .tag-user { background: #d4edda; color: #155724; font-size: .7rem; padding: 1px 5px; border-radius: 8px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .74rem; font-weight: bold; }
  .badge-high { background: #fde8e8; color: var(--seal); }
  .badge-medium { background: #fff3cd; color: #856404; }
  .badge-low { background: #d1f2eb; color: var(--success); }
  .section-divider { border: none; border-top: 1px dashed var(--border); margin: 18px 0; }
  .step-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
  .step-tab {
    padding: 9px 16px; cursor: pointer; font-size: .83rem;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    color: var(--ink-light); transition: all .15s;
  }
  .step-tab.active { border-bottom-color: var(--seal); color: var(--seal); font-weight: bold; }
  .step-tab:hover:not(.active) { background: var(--paper-dark); }
  .hidden { display: none !important; }
  .selected-norms { background: var(--paper-dark); border: 1px solid var(--border); border-radius: 3px; padding: 10px; margin-top: 8px; min-height: 40px; }
  .norm-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 12px; padding: 3px 10px; margin: 3px; font-size: .78rem;
  }
  .norm-tag button { background: none; border: none; cursor: pointer; color: var(--seal); font-size: .9rem; line-height: 1; }
  .conclusion-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: 3px; padding: 14px; white-space: pre-wrap;
    font-size: .84rem; line-height: 1.6; min-height: 200px;
  }
  .radio-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 6px 0; }
  .radio-group label { display: flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer; }
  .empty-state { text-align: center; padding: 40px; color: var(--ink-light); font-style: italic; }
  @media (max-width: 700px) {
    .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 2px solid var(--border); }
    .layout { flex-direction: column; }
    .main { padding: 14px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚖ Правовая экспертиза</div>
    <div class="subtitle">Система поддержки юридического анализа · Республика Казахстан</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Дела</span>
      <button class="btn-small" onclick="newCase()">+ Новое</button>
    </div>
    <div class="case-list" id="caseList"></div>
    <div class="sidebar-nav">
      <div class="nav-item" id="nav-codes" onclick="showSection('codes')">📖 Кодексы РК</div>
      <div class="nav-item" id="nav-db" onclick="showSection('db')">📚 База документов</div>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty-state" id="welcomeScreen">
      <p style="font-size:2rem; margin-bottom:12px">⚖</p>
      <p style="font-size:1rem; margin-bottom:8px; font-weight:bold;">Система правовой экспертизы</p>
      <p>Создайте новое дело или выберите существующее из списка слева.</p>
    </div>
  </main>
</div>

<script>
// ===== STORAGE =====
const STORAGE_KEY = 'legal_app_v1';

const SEED_VERSION = 2;

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return defaultState();
    // Migrate: replace seed docs if version is outdated
    if ((saved.seedVersion || 1) < SEED_VERSION) {
      saved.docs = (saved.docs || []).filter(d => !d.seed).concat(seedDocs());
      saved.seedVersion = SEED_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }
    return saved;
  }
  catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function defaultState() {
  return {
    cases: [],
    docs: seedDocs(),
    nextCaseId: 1,
    nextDocId: 100,
    seedVersion: SEED_VERSION
  };
}

// ===== SEED DOCS =====
function seedDocs() {
  return [
    // ── ТРУДОВОЕ ПРАВО ──
    {id:1, type:'norm',
      title:'ТК РК, ст. 52 — Основания расторжения трудового договора по инициативе работодателя (от 23.11.2015 № 414-V)',
      text:'Трудовой договор с работником по инициативе работодателя может быть расторгнут в случаях: 1) ликвидации работодателя — юридического лица либо прекращения деятельности работодателя — физического лица; 2) сокращения численности или штата работников; 3) снижения объёма производства, работ и услуг, повлёкшего ухудшение экономического положения работодателя; 4) несоответствия работника занимаемой должности вследствие недостаточной квалификации; 5) отсутствия работника на работе без уважительной причины в течение трёх и более часов подряд за один рабочий день (рабочую смену); 6) нахождения работника на работе в состоянии алкогольного, наркотического или иного токсикоманического опьянения; а также в иных случаях, предусмотренных настоящим Кодексом и иными законами РК.',
      keywords:'трудовой договор расторжение увольнение работодатель сокращение штат ликвидация несоответствие прогул',
      ref:'https://adilet.zan.kz/rus/docs/K1500000414/k150414.htm', seed:true},

    {id:2, type:'norm',
      title:'ТК РК, ст. 53 — Порядок расторжения трудового договора по инициативе работодателя (от 23.11.2015 № 414-V)',
      text:'Расторжение трудового договора по основаниям, предусмотренным подпунктами 2) и 3) пункта 1 статьи 52 ТК РК (сокращение штата, снижение объёма), производится при условии предупреждения работника не менее чем за один месяц, если трудовым, коллективным договором не предусмотрен более длительный срок. Работодатель вправе расторгнуть трудовой договор без соблюдения срока предупреждения с выплатой компенсации в размере средней заработной платы за неотработанные дни предупреждения.',
      keywords:'порядок расторжение уведомление предупреждение сокращение компенсация выходное пособие',
      ref:'https://adilet.zan.kz/rus/docs/K1500000414/k150414.htm', seed:true},

    {id:3, type:'norm',

      text:'Выплата заработной платы производится в сроки, установленные трудовым, коллективным договорами, но не реже одного раза в месяц, не позднее первой декады следующего месяца. При задержке выплаты заработной платы по вине работодателя работнику выплачивается пеня в размере не ниже 1,5% от суммы невыплаченной заработной платы за каждый день просрочки.',
      keywords:'заработная плата задержка невыплата пеня зарплата долг работник',
      ref:'https://adilet.zan.kz/rus/docs/K1500000414/k150414.htm', seed:true},

    // ── ГРАЖДАНСКОЕ ПРАВО — ОБЩАЯ ЧАСТЬ ──
    {id:4, type:'norm',
      title:'ГК РК (Общая часть), ст. 9 — Защита гражданских прав (от 27.12.1994 № 268-XIII)',
      text:'Защита нарушенных или оспариваемых гражданских прав осуществляется судом путём: признания права; восстановления положения, существовавшего до нарушения права; пресечения действий, нарушающих право; присуждения к исполнению обязанности в натуре; возмещения убытков; взыскания неустойки; компенсации морального вреда; прекращения или изменения правоотношения; признания недействительным акта государственного органа; иными способами, предусмотренными законодательными актами.',
      keywords:'защита гражданских прав убытки неустойка моральный вред восстановление нарушение',
      ref:'https://adilet.zan.kz/rus/docs/K940001000_', seed:true},

    {id:5, type:'norm',
      title:'ГК РК (Общая часть), ст. 349 — Возмещение убытков (от 27.12.1994 № 268-XIII)',
      text:'Лицо, право которого нарушено, может требовать полного возмещения причинённых ему убытков, если законодательными актами или договором не предусмотрено возмещение убытков в меньшем размере. Под убытками понимаются расходы, которые произведены или должны быть произведены лицом, чьё право нарушено (реальный ущерб), а также неполученные доходы, которые это лицо получило бы при обычных условиях оборота, если бы его право не было нарушено (упущенная выгода).',
      keywords:'убытки возмещение реальный ущерб упущенная выгода нарушение обязательства должник кредитор',
      ref:'https://adilet.zan.kz/rus/docs/K940001000_', seed:true},

    {id:6, type:'norm',
      title:'ГК РК (Общая часть), ст. 293–296 — Неустойка (штраф, пеня) (от 27.12.1994 № 268-XIII)',
      text:'Неустойкой (штрафом, пеней) признаётся определённая законодательством или договором денежная сумма, которую должник обязан уплатить кредитору в случае неисполнения или ненадлежащего исполнения обязательства, в частности, при просрочке исполнения. Кредитор вправе требовать уплаты неустойки независимо от наличия убытков. Суд вправе уменьшить неустойку, если она явно несоразмерна последствиям нарушения обязательства.',

      ref:'https://adilet.zan.kz/rus/docs/K940001000_', seed:true},

    // ── ГРАЖДАНСКОЕ ПРАВО — ОСОБЕННАЯ ЧАСТЬ ──
    {id:7, type:'norm',
      title:'ГК РК (Особенная часть), ст. 540–541 — Договор купли-продажи (от 01.07.1999 № 409-I)',
      text:'По договору купли-продажи одна сторона (продавец) обязуется передать имущество (товар) в собственность, хозяйственное ведение или оперативное управление другой стороне (покупателю), а покупатель обязуется принять это имущество и уплатить за него определённую денежную сумму (цену). Продавец обязан передать покупателю товар, предусмотренный договором.',
      keywords:'купля продажа товар продавец покупатель цена договор имущество передача',
      ref:'https://adilet.zan.kz/rus/docs/K990000409_', seed:true},

    {id:8, type:'norm',
      title:'ГК РК (Особенная часть), ст. 556–565 — Договор поставки (от 01.07.1999 № 409-I)',
      text:'По договору поставки поставщик-продавец, осуществляющий предпринимательскую деятельность, обязуется передать в обусловленный срок производимые или закупаемые им товары покупателю для использования в предпринимательской деятельности или в иных целях, не связанных с личным потреблением. Покупатель, допустивший существенное нарушение условий договора поставки (неоднократная невыплата либо невыплата в срок), предоставляет поставщику право расторгнуть договор в одностороннем порядке.',
      keywords:'поставка договор поставщик товар срок предпринимательская деятельность нарушение расторжение',
      ref:'https://adilet.zan.kz/rus/docs/K990000409_', seed:true},

    {id:9, type:'norm',
      title:'ГК РК (Особенная часть), ст. 601–603 — Имущественный найм (аренда) (от 01.07.1999 № 409-I)',
      text:'По договору имущественного найма (аренды) наймодатель обязуется предоставить нанимателю имущество за плату во временное владение и пользование. Наниматель обязан своевременно вносить плату за пользование имуществом. Если наниматель не вносит арендную плату в течение двух сроков подряд, наймодатель вправе потребовать расторжения договора и возмещения убытков.',

      text:'По договору подряда одна сторона (подрядчик) обязуется выполнить по заданию другой стороны (заказчика) определённую работу и сдать её результат заказчику, а заказчик обязуется принять результат работы и оплатить его. Если подрядчик не приступает своевременно к исполнению договора или выполняет работу настолько медленно, что её окончание к сроку становится явно невозможным, заказчик вправе отказаться от договора и потребовать возмещения убытков.',

    {id:11, type:'norm',
      title:'КоАП РК, ст. 87 — Нарушение законодательства о труде (от 05.07.2014 № 235-V)',
      text:'Нарушение законодательства Республики Казахстан о труде, выразившееся в незаконном отказе в заключении трудового договора, незаконном расторжении трудового договора, нарушении порядка и условий оплаты труда — влечёт предупреждение или штраф на должностных лиц в размере 30 МРП, на субъектов малого предпринимательства — 60 МРП, на субъектов среднего предпринимательства — 100 МРП, на субъектов крупного предпринимательства — 200 МРП.',
      keywords:'административная ответственность нарушение труд штраф МРП незаконное увольнение оплата',

let state = loadState();
let currentCaseId = null;
let currentSection = 'case'; // 'case' | 'db'
let currentStep = 1;

// ===== RENDER SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('caseList');
  list.innerHTML = '';
  if (state.cases.length === 0) {
    list.innerHTML = '<div style="padding:14px;font-size:.8rem;color:#999;font-style:italic;">Нет дел</div>';
    return;
  }
  state.cases.forEach(c => {
    const div = document.createElement('div');
    div.className = 'case-item' + (currentCaseId === c.id ? ' active' : '');
    const statusLabel = {draft:'Черновик', active:'В работе', done:'Завершено'}[c.status];
    const statusClass = {draft:'status-draft', active:'status-active', done:'status-done'}[c.status];
    div.innerHTML = `<div class="case-name">${esc(c.name||'Без названия')}</div>
      <div class="case-status ${statusClass}">${statusLabel}</div>`;
    div.onclick = () => openCase(c.id);
    list.appendChild(div);
  });
}

// ===== CASE CRUD =====
function newCase() {
  const c = {
    id: state.nextCaseId++,
    name: 'Новое дело',
    facts: '', question: '',
    status: 'draft',
    norms: [],
    violation: '', riskLevel: '', legalBasis: '', recommendations: '',
    practice: [],
    reviewerNote: '',
    createdAt: Date.now()
  };
  state.cases.unshift(c);
  saveState();
  openCase(c.id);
}

function openCase(id) {
  currentCaseId = id;
  currentSection = 'case';
  currentStep = 1;
  document.getElementById('nav-db').classList.remove('active');
  renderSidebar();
  renderCaseView();
}

function currentCase() { return state.cases.find(c => c.id === currentCaseId); }

// ===== CASE VIEW =====
function renderCaseView() {
  const c = currentCase();
  if (!c) return;
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="step-tabs">
      ${[1,2,3,4,5].map(i => `<div class="step-tab${currentStep===i?' active':''}" onclick="goStep(${i})">Блок ${i}: ${stepName(i)}</div>`).join('')}
    </div>
    <div id="stepContent"></div>
  `;
  renderStep();
}

function stepName(i) {
  return ['Факты','Нормы','Выводы','Практика','Заключение'][i-1];
}

function goStep(i) {
  saveCaseFields();
  currentStep = i;
  renderStep();
  // update tab highlight
  document.querySelectorAll('.step-tab').forEach((t,idx) => t.classList.toggle('active', idx+1===i));
  document.getElementById('stepContent').scrollIntoView({behavior:'smooth'});
}

function renderStep() {
  const c = currentCase();
  const el = document.getElementById('stepContent');
  if (!el||!c) return;
  if (currentStep===1) el.innerHTML = renderStep1(c);
  else if (currentStep===2) el.innerHTML = renderStep2(c);
  else if (currentStep===3) el.innerHTML = renderStep3(c);
  else if (currentStep===4) el.innerHTML = renderStep4(c);
  else if (currentStep===5) el.innerHTML = renderStep5(c);
}

// ===== SEARCH =====
function tokenize(str) {
  return (str||'').toLowerCase().replace(/[^\wа-яёА-ЯЁ\s]/g,'').split(/\s+/).filter(Boolean);
}
function searchDocs(query, type) {
  const tokens = tokenize(query);
  if (!tokens.length) return [];
  return state.docs
    .filter(d => d.type === type)
    .map(d => {
      const haystack = tokenize(d.title + ' ' + d.text + ' ' + d.keywords);
      const score = tokens.filter(t => haystack.some(h => h.includes(t))).length;
      return {...d, score};
    })
    .filter(d => d.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0,6);
}

function renderDocResults(results, type, c) {
  if (!results.length) return '<div style="font-size:.82rem;color:#999;padding:8px">Совпадений не найдено. Уточните запрос или добавьте документы в базу.</div>';
  const selectedIds = type === 'norm' ? c.norms : c.practice;
  return results.map(d => {
    const selected = selectedIds.includes(d.id);
    return `<div class="result-item">
      <div class="ri-title">${esc(d.title)} <span class="ri-score">+${d.score}</span></div>
      <div class="ri-meta">${d.seed ? '<span class="tag-seed">затравочный пример</span>' : '<span class="tag-user">из вашей базы</span>'}</div>
      <div style="font-size:.79rem;color:var(--ink-light);margin-top:6px">${esc(d.text.slice(0,180))}${d.text.length>180?'...':''}</div>
      ${d.ref ? `<div style="font-size:.76rem;margin-top:4px"><a href="${esc(d.ref)}" target="_blank">${esc(d.ref)}</a></div>` : ''}
      <div class="btn-row" style="margin-top:8px">
        ${selected
          ? `<button class="btn btn-secondary" style="font-size:.76rem;padding:4px 10px" onclick="removeFromCase(${d.id},'${type}')">✕ Убрать из дела</button>`
          : `<button class="btn btn-primary" style="font-size:.76rem;padding:4px 10px" onclick="addToCase(${d.id},'${type}')">+ В дело</button>`}
      </div>
    </div>`;
  }).join('');
}

function runManualSearch(type) {
  const c = currentCase();
  const q = document.getElementById('searchQuery').value;
  const results = searchDocs(q || (c.facts + ' ' + c.question), type);
  document.getElementById('searchResults2').innerHTML = renderDocResults(results, type, c);
}

function addToCase(docId, type) {
  const c = currentCase();
  const arr = type === 'norm' ? c.norms : c.practice;
  if (!arr.includes(docId)) arr.push(docId);
  saveState();
  renderStep();
}

function removeFromCase(docId, type) {
  const c = currentCase();
  if (type === 'norm') c.norms = c.norms.filter(id=>id!==docId);
  else c.practice = c.practice.filter(id=>id!==docId);
  saveState();
  renderStep();
}

function renderSelectedNorms(c) {
  if (!c.norms.length) return '<span style="font-size:.8rem;color:#999">Нормы не выбраны</span>';
  return c.norms.map(nid => {
    const d = state.docs.find(d=>d.id===nid);
    if (!d) return '';
    return `<span class="norm-tag">${esc(d.title.slice(0,60))} <button onclick="removeFromCase(${d.id},'norm')">×</button></span>`;
  }).join('');
}

function renderSelectedPractice(c) {
  if (!c.practice.length) return '<span style="font-size:.8rem;color:#999">Практика не добавлена</span>';
  return c.practice.map(nid => {
    const d = state.docs.find(d=>d.id===nid);
    if (!d) return '';
    return `<span class="norm-tag">${esc(d.title.slice(0,60))} <button onclick="removeFromCase(${d.id},'practice')">×</button></span>`;
  }).join('');
}

function addManualNorm() {
  const title = document.getElementById('mn_title').value.trim();
  const text = document.getElementById('mn_text').value.trim();
  const ref = document.getElementById('mn_ref').value.trim();
  if (!title) { alert('Введите наименование нормы'); return; }
  const doc = {id: state.nextDocId++, type:'norm', title, text, keywords:'', ref, seed:false};
  state.docs.push(doc);
  addToCase(doc.id, 'norm');
}

function addManualPractice() {
  const title = document.getElementById('mp_title').value.trim();
  const text = document.getElementById('mp_text').value.trim();
  const ref = document.getElementById('mp_ref').value.trim();
  if (!title) { alert('Введите наименование'); return; }
  const doc = {id: state.nextDocId++, type:'practice', title, text, keywords:'', ref, seed:false};
  state.docs.push(doc);
  addToCase(doc.id, 'practice');
}

// ===== SAVE FIELDS =====
function saveCaseFields() {
  const c = currentCase();
  if (!c) return;
  const v = id => { const el=document.getElementById(id); return el?el.value:''; };
  if (currentStep===1) {
    c.name = v('f_name') || 'Без названия';
    c.facts = v('f_facts');
    c.question = v('f_question');
  } else if (currentStep===3) {
    const vr = document.querySelector('input[name=violation]:checked');
    const rl = document.querySelector('input[name=riskLevel]:checked');
    c.violation = vr ? vr.value : c.violation;
    c.riskLevel = rl ? rl.value : c.riskLevel;
    c.legalBasis = v('f_legalBasis');
    c.recommendations = v('f_recommendations');
  } else if (currentStep===5) {
    c.reviewerNote = v('f_reviewerNote');
  }
  saveState();
  renderSidebar();
}

function saveStatus() {
  const c = currentCase();
  if (!c) return;
  c.status = document.getElementById('f_status').value;
  saveState(); renderSidebar();
}

function saveAndNext() { saveCaseFields(); goStep(currentStep+1); }
function saveAndGoStep(n) { saveCaseFields(); goStep(n); }

// ===== CONCLUSION =====
function buildConclusion(c) {
  const violationText = {yes:'Да, нарушение имеется', partial:'Нарушение носит частичный характер', no:'Нарушения не выявлено', '':'Не определено'}[c.violation||''];
  const riskText = {high:'Высокий', medium:'Средний', low:'Низкий', '':'Не определён'}[c.riskLevel||''];

  const norms = c.norms.map(id => {
    const d = state.docs.find(d=>d.id===id);
    return d ? `  • ${d.title}${d.ref ? '\n    Источник: '+d.ref : ''}` : '';
  }).filter(Boolean).join('\n');

  const pract = c.practice.map(id => {
    const d = state.docs.find(d=>d.id===id);
    return d ? `  • ${d.title}${d.ref ? '\n    Ссылка: '+d.ref : ''}` : '';
  }).filter(Boolean).join('\n');

  return `ПРАВОВОЕ ЗАКЛЮЧЕНИЕ
${'='.repeat(60)}

Дело: ${c.name}
Дата подготовки: ${new Date().toLocaleDateString('ru-KZ')}

1. ФАКТИЧЕСКИЕ ОБСТОЯТЕЛЬСТВА
${c.facts || '(не заполнено)'}

2. СПОРНЫЙ ПРАВОВОЙ ВОПРОС
${c.question || '(не заполнено)'}

3. ПРИМЕНЯЕМЫЕ НОРМЫ ЗАКОНОДАТЕЛЬСТВА РК
${norms || '(нормы не выбраны)'}

4. ПРАВОВАЯ ОЦЕНКА
Наличие нарушения: ${violationText}
Уровень риска: ${riskText}

Правовое обоснование:
${c.legalBasis || '(не заполнено)'}

5. РЕКОМЕНДАЦИИ
${c.recommendations || '(не заполнено)'}

6. СУДЕБНАЯ ПРАКТИКА И РАЗЪЯСНЕНИЯ
${pract || '(практика не добавлена)'}

${'─'.repeat(60)}
ОГОВОРКА: Настоящее заключение является черновым документом,
подготовленным с использованием системы поддержки правового анализа.
Заключение не имеет юридической силы и подлежит проверке,
корректировке и подписанию уполномоченным юристом.

Подпись юриста: ___________________________ / ${new Date().toLocaleDateString('ru-KZ')} /

${c.reviewerNote ? `\nПримечания проверяющего:\n${c.reviewerNote}` : ''}`;
}

function copyConclusion() {
  saveCaseFields();
  const c = currentCase();
  navigator.clipboard.writeText(buildConclusion(c))
    .then(()=>alert('Заключение скопировано в буфер обмена.'))
    .catch(()=>alert('Не удалось скопировать. Выделите текст вручную.'));
}

function downloadConclusion() {
  saveCaseFields();
  const c = currentCase();
  const text = buildConclusion(c);
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `zakluchenie_${(c.name||'delo').replace(/[^a-zа-яё0-9]/gi,'_')}.txt`;
  a.click();
}

function markDone() {
  saveCaseFields();
  const c = currentCase();
  c.status = 'done';
  saveState();
  renderSidebar();
  alert('Дело отмечено как завершённое.');
}

function webSearch() {
  const c = currentCase();
  const q = encodeURIComponent(`судебная практика РК по делу: ${c.question || c.facts.slice(0,100)}`);
  window.open(`https://www.google.com/search?q=${q}+site:sud.gov.kz+OR+site:adilet.zan.kz`, '_blank');
}

// ===== DOCUMENT BASE SECTION =====
function showSection(section) {
  currentSection = section;
  currentCaseId = null;
  document.getElementById('nav-db').classList.toggle('active', section === 'db');
  document.getElementById('nav-codes').classList.toggle('active', section === 'codes');
  document.querySelectorAll('.case-item').forEach(el=>el.classList.remove('active'));
  if (section === 'codes') renderCodesSection();
  else renderDbSection();
}

function renderCodesSection() {
  const main = document.getElementById('mainContent');
  const groups = ALL_CODES.map(g => `
    <div style="margin-bottom:22px">
      <div style="font-size:.8rem;font-weight:bold;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-light);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--border)">${esc(g.group)}</div>
      ${g.items.map(item => `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:3px;margin-bottom:6px;flex-wrap:wrap">
          <div>
            <div style="font-size:.88rem;font-weight:bold;color:var(--ink)">${esc(item.title)}</div>
            <div style="font-size:.76rem;color:var(--ink-light);margin-top:2px">${esc(item.date)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <a href="${esc(item.url)}" target="_blank" class="btn btn-secondary" style="font-size:.76rem;padding:4px 10px;text-decoration:none">Аділет ↗</a>
            <button class="btn btn-gold" style="font-size:.76rem;padding:4px 10px" onclick="addCodeToBase(${JSON.stringify(item).replace(/'/g,'&#39;')})">+ В базу</button>
          </div>
        </div>`).join('')}
    </div>`).join('');

  main.innerHTML = `
  <div class="card">
    <div class="card-header"><h2>Кодексы Республики Казахстан</h2></div>
    <div class="card-body">
      <div class="disclaimer">📖 Ссылки ведут на официальный портал ИПС «Әділет» (adilet.zan.kz). Кнопка «+ В базу» добавляет кодекс как документ для поиска по делам.</div>
      ${groups}
    </div>
  </div>`;
}

function addCodeToBase(item) {
  if (state.docs.some(d => d.ref === item.url && d.title === item.title)) {
    alert('Этот кодекс уже есть в базе документов.'); return;
  }
  state.docs.push({
    id: state.nextDocId++,
    type: 'norm',
    title: item.title + ' ' + item.date,
    text: item.title + '. Официальный текст доступен по ссылке: ' + item.url,
    keywords: item.title.toLowerCase(),
    ref: item.url,
    seed: false
  });
  saveState();
  alert('Добавлено в базу документов. Теперь кодекс будет участвовать в поиске по делам.');
}

function renderDbSection() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
  <div class="card">
    <div class="card-header"><h2>База документов — нормы и практика</h2></div>
    <div class="card-body">
      <div class="disclaimer">📚 Добавляйте законодательство РК, судебные решения и разъяснения госорганов. Затравочные примеры защищены от удаления и служат только для демонстрации поиска.</div>
      <details style="margin-bottom:14px">
        <summary style="cursor:pointer;font-size:.88rem;font-weight:bold">+ Добавить документ в базу</summary>
        <div style="margin-top:12px;border:1px solid var(--border);border-radius:3px;padding:14px;background:#fff">
          <div class="form-row">
            <label>Тип документа</label>
            <select id="db_type"><option value="norm">Норма законодательства</option><option value="practice">Судебная практика / разъяснение</option></select>
          </div>
          <div class="form-row"><label>Наименование</label><input type="text" id="db_title" placeholder="Напр.: ГК РК ст. 407 — ..."></div>
          <div class="form-row"><label>Текст / краткое содержание</label><textarea id="db_text" rows="4"></textarea></div>
          <div class="form-row"><label>Ключевые слова (через пробел)</label><input type="text" id="db_keywords" placeholder="договор аренда обязательство..."></div>
          <div class="form-row"><label>Ссылка на источник</label><input type="text" id="db_ref" placeholder="https://adilet.zan.kz/..."></div>
          <button class="btn btn-primary" onclick="addDbDoc()">Добавить</button>
        </div>
      </details>
      <div id="dbList">${renderDbList()}</div>
    </div>
  </div>`;
}

function renderDbList() {
  const norms = state.docs.filter(d=>d.type==='norm');
  const pract = state.docs.filter(d=>d.type==='practice');
  const renderGroup = (docs, label) => {
    if (!docs.length) return '';
    return `<div style="margin-bottom:18px">
      <div style="font-size:.82rem;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-light);margin-bottom:8px">${label}</div>
      ${docs.map(d=>`<div class="result-item">
        <div class="ri-title">${esc(d.title)}</div>
        <div class="ri-meta">${d.seed ? '<span class="tag-seed">затравочный пример</span>' : '<span class="tag-user">ваш документ</span>'}${d.ref?` · <a href="${esc(d.ref)}" target="_blank" style="font-size:.76rem">${esc(d.ref)}</a>`:''}</div>
        <div style="font-size:.79rem;color:var(--ink-light);margin-top:6px">${esc(d.text.slice(0,200))}${d.text.length>200?'...':''}</div>
        ${!d.seed ? `<button class="btn btn-secondary" style="font-size:.74rem;padding:3px 8px;margin-top:8px;color:var(--seal)" onclick="deleteDoc(${d.id})">Удалить</button>` : ''}
      </div>`).join('')}
    </div>`;
  };
  return renderGroup(norms, 'Нормы законодательства') + renderGroup(pract, 'Судебная практика и разъяснения');
}

function addDbDoc() {
  const title = document.getElementById('db_title').value.trim();
  const text = document.getElementById('db_text').value.trim();
  if (!title) { alert('Введите наименование'); return; }
  const doc = {
    id: state.nextDocId++,
    type: document.getElementById('db_type').value,
    title, text,
    keywords: document.getElementById('db_keywords').value.trim(),
    ref: document.getElementById('db_ref').value.trim(),
    seed: false
  };
  state.docs.push(doc);
  saveState();
  document.getElementById('dbList').innerHTML = renderDbList();
}

function deleteDoc(id) {
  if (!confirm('Удалить документ из базы?')) return;
  state.docs = state.docs.filter(d=>d.id!==id);
  // Remove from all cases
  state.cases.forEach(c => {
    c.norms = c.norms.filter(i=>i!==id);
    c.practice = c.practice.filter(i=>i!==id);
  });
  saveState();
  document.getElementById('dbList').innerHTML = renderDbList();
}

// ===== UTILS =====
function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
